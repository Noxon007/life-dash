# Modul: Mahlzeiten / Essen
# Events der Kategorie "meal" + Gerichte als Kompendium-Entities.
key: food
label: Essen
icon: utensils
color: "#ffd166"
event_categories:
  - meal
keywords:
  - gegessen
  - restaurant
  - mahlzeit
  - frühstück
  - mittagessen
  - abendessen
  - gekocht
  - essen
entity_schema:
  cuisine: string
statistics:
  - id: dishes_count
    label: "Gerichte erfasst"
    type: count_distinct
    field: entity.name
compendium_view:
  group_by: name
# --- A7: Frontend & KI-Prompt aus dem YAML ---
emoji: "🍽️"
compendium: true
category_labels:
  meal: Mahlzeit
prompt_rules: |
  - Kategorie meal = Essen/Mahlzeit (Restaurantbesuch, besonderes Gericht, gekocht).
  - Entity food: konkretes Gericht oder Essen ("Ramen", "Pizza Margherita", ...).

# --- F6: Erfolge ---
achievements:
  - id: gourmet
    label: "Feinschmecker"
    emoji: "🍽️"
    description: "Verschiedene Gerichte gegessen"
    metric: entity_count
    tiers: { bronze: 10, silber: 50, gold: 150, platin: 500 }
