# Modul: Konzerte / Künstler
# Events der Kategorie "concert" + Künstler/Bands als Kompendium-Entities.
key: artist
label: Künstler
icon: music
color: "#ff5c9e"
event_categories:
  - concert
keywords:
  - konzert
  - festival
  - auftritt
  - live gesehen
  - tour
entity_schema:
  genre: string
statistics:
  - id: artists_seen
    label: "Künstler live gesehen"
    type: count_distinct
    field: entity.name
  - id: concerts_per_year
    label: "Konzerte pro Jahr"
    type: timeseries
compendium_view:
  group_by: name
# --- A7: Frontend & KI-Prompt aus dem YAML ---
emoji: "🎤"
compendium: true
category_labels:
  concert: Konzert
prompt_rules: |
  - Kategorie concert = Konzert, Festival, Live-Auftritt.
  - Entity artist: Band oder Künstler bei Konzerten/Festivals ("Die Ärzte", "Rammstein", ...).

# --- F6: Erfolge ---
achievements:
  - id: concert_goer
    label: "Konzertgänger"
    emoji: "🎸"
    description: "Konzerte und Festivals besucht"
    metric: event_count
    tiers: { bronze: 3, silber: 15, gold: 50, platin: 150 }
  - id: artist_collector
    label: "Bühnen-Sammler"
    emoji: "🎤"
    description: "Verschiedene Künstler live gesehen"
    metric: entity_count
    tiers: { bronze: 3, silber: 15, gold: 50, platin: 150 }
