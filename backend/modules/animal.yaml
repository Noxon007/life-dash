# Modul: Tiere
key: animal
label: Tiere
icon: paw
color: "#35c4a7"
event_categories:
  - sighting
keywords:
  - gesehen
  - beobachtet
  - gesichtet
  - entdeckt
# Bekannte Tierarten, die der Mock-Provider als Entity erkennt
known_entities:
  - adler
  - seeadler
  - reh
  - fuchs
  - eule
  - eichhörnchen
  - schwan
  - frosch
  - igel
  - specht
  - kranich
  - storch
  - taube
  - amsel
  - meise
  - spatz
  - rotkehlchen
  - ente
  - gans
  - reiher
  - falke
  - bussard
  - hase
  - wildschwein
  - hirsch
  - dachs
  - marder
  - eichhörnchen
  - biber
  - otter
  - kaninchen
  - maus
  - katze
  - hund
  - pferd
  - kuh
  - schaf
  - ziege
  - libelle
  - schmetterling
  - biene
  - hummel
entity_schema:
  species: string
  wild: boolean
statistics:
  - id: species_count
    label: "Beobachtete Arten"
    type: count_distinct
    field: entity.species
  - id: sightings_per_year
    label: "Sichtungen pro Jahr"
    type: timeseries
compendium_view:
  group_by: species
  detail_map: true
# --- A7: Frontend & KI-Prompt aus dem YAML ---
emoji: "🦅"
compendium: true
category_labels:
  sighting: Sichtung
prompt_rules: |
  - Kategorie sighting = ein Tier gesehen/beobachtet.
  - Entity animal: JEDES erwähnte Tier, egal welche Art — Hai, Adler, Kuh, Qualle ...
    attributes: {"species": "<Tierart>", "wild": true/false}. Name = die Tierart, nicht "ein Tier".

# --- F6: Erfolge (Metrik + Schwellwerte, vier Stufen) ---
achievements:
  - id: animal_collector
    label: "Tier-Sammler"
    emoji: "🦁"
    description: "Verschiedene Tierarten gesehen"
    metric: entity_count
    tiers: { bronze: 5, silber: 25, gold: 100, platin: 500 }
  - id: animal_watcher
    label: "Beobachter"
    emoji: "🔭"
    description: "Tiersichtungen festgehalten"
    metric: event_count
    tiers: { bronze: 10, silber: 50, gold: 200, platin: 1000 }
