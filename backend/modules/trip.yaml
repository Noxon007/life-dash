# Modul: Reisen
key: trip
label: Reisen
icon: airplane
color: "#5b8cff"
event_categories:
  - trip
# Schlüsselwörter helfen dem Mock-Provider bei der Kategorie-Erkennung
keywords:
  - urlaub
  - reise
  - trip
  - städtetrip
  - ausflug
  - wochenende in
entity_schema:
  country: string
  city: string
statistics:
  - id: trips_per_year
    label: "Reisen pro Jahr"
    type: timeseries
compendium_view:
  group_by: country
  detail_map: true
# --- A7: Frontend & KI-Prompt aus dem YAML ---
emoji: "🧳"
category_labels:
  trip: Reise
prompt_rules: |
  - Kategorie trip = Reise, Urlaub, Ausflug, Städtetrip.

# --- F6: Erfolge ---
achievements:
  - id: traveller
    label: "Vielreisender"
    emoji: "🧳"
    description: "Reisen und Ausflüge unternommen"
    metric: event_count
    tiers: { bronze: 5, silber: 25, gold: 75, platin: 200 }
