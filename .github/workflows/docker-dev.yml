# TEST-GLEIS (Anmerkung 86): Jeder Push auf `main` baut ein Image `:main`.
#
#   Auf dem Server:  LIFEDASH_VERSION=main  ->  docker compose pull && up -d
#
# Damit kostet das Ausprobieren einer Änderung keine Versionsnummer mehr.
# Vorher gab es nur den Bau auf SemVer-Tags — und weil das der einzige Weg auf
# den eigenen Server war, entstanden 41 Versionen in sechs Tagen, von denen nur
# neun je getaggt wurden.
#
# Veröffentlicht wird in `docker-release.yml`. Bewusst zwei Dateien statt einer
# mit zwei Auslösern: Nur hier stehen Pfadfilter und das Abbrechen laufender
# Bauten. Beides ist für Testbauten richtig und für eine Veröffentlichung
# gefährlich — ein Release, das wegen eines Filters still nicht baut, merkt man
# erst, wenn der Server das Image nicht findet.
name: Docker Dev Build

on:
  push:
    branches: ["main"]
    # Reine Text-Änderungen bauen kein Image: ein Tippfehler im CHANGELOG
    # rechtfertigt keine zehn Minuten Multi-Arch-Bau.
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
  workflow_dispatch:          # manueller Bau desselben Stands

permissions:
  contents: read
  packages: write

# Schnell hintereinander gepusht? Dann ist nur der letzte Stand interessant.
concurrency:
  group: docker-dev
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - name: Login GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push :main
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64  # arm64: Raspberry Pi 5
          tags: ghcr.io/${{ github.repository }}:main
          # Damit ein laufender Container sagen kann, WELCHER Stand er ist:
          # die Versionsnummer allein genügt dafür nicht mehr, sobald es
          # Test-Images zwischen zwei Versionen gibt (siehe /health).
          build-args: |
            BUILD_REF=${{ github.ref_name }}
            BUILD_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
