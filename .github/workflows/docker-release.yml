# Baut das Life-Dash-Image bei jedem SemVer-Tag (vMAJOR.MINOR.PATCH, z. B. v0.3.0)
# und pusht es nach ghcr.io/<owner>/life-dash mit den Tags:
#   0.3.0  (exakt) · 0.3  (mitlaufend im Minor) · latest
# Der Image-Pfad kommt automatisch aus dem Repo-Namen — kein OWNER-Platzhalter nötig.
name: Docker Release

on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]  # nur echte SemVer-Tags
  workflow_dispatch:                  # manueller Re-Build (taggt :main)

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image-Tags ableiten
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          # SemVer-Tag v0.3.0 -> Image-Tags 0.3.0, 0.3, latest (latest=auto).
          # Manueller Dispatch auf main -> :main (zum Nachbauen ohne Release).
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64  # arm64: Raspberry Pi 5
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
