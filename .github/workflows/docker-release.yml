# VERÖFFENTLICHUNGS-GLEIS (Anmerkung 86): Ein SemVer-Tag (vMAJOR.MINOR.PATCH,
# z. B. v0.32.0) baut das Image und pusht es nach ghcr.io/<owner>/life-dash als:
#   0.32.0  (exakt) · 0.32  (mitlaufend im Minor) · latest
# Der Image-Pfad kommt automatisch aus dem Repo-Namen — kein OWNER-Platzhalter.
#
# Zum bloßen Ausprobieren braucht es das hier NICHT: ein Push auf `main` baut
# über `docker-dev.yml` ein Image `:main`. Eine Versionsnummer entsteht nur,
# wenn ein Nutzer einen Unterschied merken würde.
#
# Hier steht mit Absicht KEIN Pfadfilter und KEIN cancel-in-progress: Eine
# Veröffentlichung, die wegen eines Filters still nicht baut oder mittendrin
# abgebrochen wird, fällt erst auf, wenn der Server das Image nicht findet.
name: Docker Release

on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]  # nur echte SemVer-Tags
  workflow_dispatch:                  # Nachbau eines Tags von Hand

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - name: Login GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image-Tags ableiten
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          # SemVer-Tag v0.32.0 -> Image-Tags 0.32.0, 0.32, latest (latest=auto).
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build & Push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64  # arm64: Raspberry Pi 5
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Herkunft des Images auch hier mitgeben — /health kann dann sagen,
          # aus welchem Commit die laufende Veröffentlichung gebaut wurde.
          build-args: |
            BUILD_REF=${{ github.ref_name }}
            BUILD_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
