# Life-Dash — Homelab-Deployment
#
#   Server (Image aus GHCR, öffentlich — kein Login nötig):
#     docker compose pull && docker compose up -d
#
#   Lokaler Build aus dem Quell-Checkout:
#     docker compose build && docker compose up -d
#
# Datenbank: PostgreSQL (Standard, eigener Service "db"). SQLite geht weiter
# für Minimal-Setups: DATABASE_URL=sqlite:////data/lifedash.db in .env setzen
# und nur die App starten (docker compose up -d --no-deps app).
#
# Alle Daten liegen als Bind-Mounts NEBEN dieser Datei (kein docker volume):
#   ./data  -> App-Daten (SQLite-DB, falls genutzt)
#   ./db    -> PostgreSQL-Datenverzeichnis
# Backup = diese Ordner sichern (bzw. der JSON-Export aus der App).
#
# KI läuft über die Gemini API (OpenAI-kompatibler Endpoint) — kein lokaler
# LLM-Dienst im Stack. Konfiguration über .env (siehe .env.example).
# Details: docs/DEPLOY.md
services:
  app:
    image: ghcr.io/noxon007/life-dash:${LIFEDASH_VERSION:-0.13.0}
    build: .  # greift nur bei `docker compose build` im Quell-Checkout
    restart: unless-stopped
    ports:
      - "${LIFEDASH_PORT:-8000}:8000"
    volumes:
      # App-Daten (z. B. SQLite-DB beim Minimal-Setup)
      - ./data:/data
    # Log-Rotation: `docker logs` bleibt nutzbar, ohne die SD-Karte zu füllen
    logging: &default-logging
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    environment:
      TZ: ${TZ:-Europe/Berlin}
      # Ausführlichkeit der App-Logs: DEBUG | INFO | WARNING | ERROR (A9)
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # --- Auth (Pocket ID) ---
      AUTH_MODE: ${AUTH_MODE:-oidc}
      OIDC_ISSUER: ${OIDC_ISSUER:?OIDC_ISSUER in .env setzen (Pocket ID URL)}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:?OIDC_CLIENT_ID in .env setzen}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://127.0.0.1:8000}
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET in .env setzen (langer Zufallswert)}
      # --- KI: Gemini API (OpenAI-kompatibel), Chat + Embeddings ---
      AI_PROVIDER: ${AI_PROVIDER:-openai}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://generativelanguage.googleapis.com/v1beta/openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY:?OPENAI_API_KEY in .env setzen (Gemini-Key von aistudio.google.com/apikey) — oder AI_PROVIDER=mock}
      OPENAI_MODEL: ${OPENAI_MODEL:-gemini-3.5-flash}
      OPENAI_EMBED_MODEL: ${OPENAI_EMBED_MODEL:-gemini-embedding-2}
      OPENAI_EMBED_BASE_URL: ${OPENAI_EMBED_BASE_URL:-}
      OPENAI_EMBED_API_KEY: ${OPENAI_EMBED_API_KEY:-}
      SEMANTIC_MIN_SIMILARITY: ${SEMANTIC_MIN_SIMILARITY:-0.6}
      GEOCODING_ENABLED: ${GEOCODING_ENABLED:-true}
      # --- DB: PostgreSQL (Default) — SQLite via DATABASE_URL-Override ---
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://lifedash:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD in .env setzen}@db:5432/lifedash}
      SEED_DEMO: ${SEED_DEMO:-false}
    depends_on:
      db:
        condition: service_healthy

  db:
    # PG 18: Support bis Nov. 2030, Async-I/O (schnellere Reads auf dem Pi);
    # pgvector/PostGIS (geplant) unterstützen 18 inkl. ARM64.
    # Achtung: Major-Wechsel auf bestehendem Volume braucht Dump/Restore
    # (JSON-Export -> Volume leeren -> Import, docs/DEPLOY.md Kap. 6).
    image: postgres:18-alpine
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_DB: lifedash
      POSTGRES_USER: lifedash
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD in .env setzen}
    volumes:
      # Ab postgres:18 liegt PGDATA versioniert unter /var/lib/postgresql/<major>/;
      # der Mount MUSS deshalb aufs Elternverzeichnis zeigen (nicht mehr .../data),
      # sonst landen die Daten außerhalb des Mounts (Datenverlust beim Recreate).
      # Bonus: künftige Major-Upgrades können pg_upgrade --link im selben Ordner nutzen.
      # Der Ordner gehört nach dem ersten Start dem Container-User (uid 70) —
      # fürs Backup daher mit sudo lesen (tar/rsync als root).
      - ./db:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lifedash -d lifedash"]
      interval: 10s
      timeout: 5s
      retries: 5
